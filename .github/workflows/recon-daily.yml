name: Daily DeBank Recon

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build wallet inventory
        run: node src/build-wallet-inventory.js
      - name: DeBank wallet recon
        run: node src/build-debank-recon.js
        env:
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}
      - name: Import DeBank positions for protocols without a scanner
        # Brings Dolomite / Curvance / Gearbox / Venus / LFJ / ethstrat /
        # Yuzu Money into the DB once per day. See src/debank-import.js for
        # the protocol allowlist. These rows are marked source_type='debank'
        # and expire after 48h via purge-stale-positions.js Tier 2 if a
        # later DeBank recon stops reporting them.
        run: node src/debank-import.js
      - name: Reconcile gaps against latest modeled data
        run: node src/reconcile-gaps.js
      - name: Pull latest from remote (avoids push race with other workflows)
        # Daily recon is the only DeBank consumer, but if a scan workflow
        # lands a commit between our checkout and our push, the commit step
        # fails. Same guard as free-scans-hourly.yml.
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          OUT_FILES="data/recon/wallet-inventory.json data/recon/debank-wallet-summary.json data/recon/debank-wallet-positions.json data/recon/gap-report.json yield-tracker.db"
          mkdir -p /tmp/recon-output
          for f in $OUT_FILES; do
            if [ -f "$f" ]; then
              mkdir -p "/tmp/recon-output/$(dirname $f)"
              cp "$f" "/tmp/recon-output/$f"
            fi
          done
          git checkout -- $OUT_FILES 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          for f in $OUT_FILES; do
            if [ -f "/tmp/recon-output/$f" ]; then
              mkdir -p "$(dirname $f)"
              cp "/tmp/recon-output/$f" "$f"
            fi
          done
      - name: Commit recon artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily DeBank recon ${{ github.run_number }}"
          file_pattern: data/recon/wallet-inventory.json data/recon/debank-wallet-summary.json data/recon/debank-wallet-positions.json data/recon/gap-report.json yield-tracker.db
