name: Update Whale Data

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Legacy DeBank-heavy path retained only as transitional compatibility.
      # Do not treat as the target architecture; daily recon + hourly free scans are the preferred path.
      - name: Legacy DeBank fetch (transitional)
        run: node src/fetch.js
        env:
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}

      # API/On-chain whales
      - name: Fetch InfiniFi data
        run: node src/fetch-infinifi.js

      - name: Fetch Anzen data
        run: node src/fetch-anzen.js

      - name: Fetch Pareto data
        run: node src/fetch-pareto.js

      - name: Fetch Re Protocol data
        run: node src/fetch-re.js

      # Aave multi-chain scanner (Merit bonuses + all markets)
      - name: Scan Aave positions
        run: node src/aave-scanner.js

      # Morpho scanner (REST API - catches positions DeBank misses)
      - name: Scan Morpho positions
        run: node src/morpho-scanner.js

      # Euler scanner
      - name: Scan Euler positions
        run: node src/euler-scanner.js

      # Spark scanner (Aave-style RPC + Savings vaults)
      - name: Scan Spark positions
        run: node src/spark-scanner.js
        env:
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}

      # Pendle scanner (unified: portfolio endpoint + balanceOf fallback)
      - name: Scan Pendle positions
        run: node src/pendle-scanner.js

      # APY enrichment (fetches rates from Aave/Morpho/Euler/Spark/Pendle)
      - name: Enrich positions with market/vault info
        run: node src/enrich-markets.js

      - name: Fetch base APY rates
        run: node src/fetch-base-apy.js

      - name: Fetch Merkl incentives
        run: node src/fetch-merkl.js || node src/fetch-merkl.js || echo 'Merkl failed after 3 attempts'

      - name: Fix Morpho collateral labels
        run: node src/fix-morpho-tokens.js yield-tracker.db --apply

      - name: Export to data.json
        run: node src/export.js

      - name: Build source audit
        run: node src/source-audit.js

      - name: Check regression fixtures
        run: node src/check-fixtures.js

      - name: Validate data (5% threshold)
        id: validate
        run: node src/validate.js

      - name: Alert on failure
        if: failure()
        run: |
          STEP='${{ job.status }}'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="⚠️ Whale data update FAILED! Run #${{ github.run_number }} (status: $STEP). Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update whale data ${{ github.run_number }}"
          file_pattern: data/whales/ data/manual-positions.json data/total-history.json data/source-audit.json data/protocol-registry.json data/regression-fixtures.json data.json yield-tracker.db
