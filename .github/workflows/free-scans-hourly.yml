name: Protocol Scans (2h)

on:
  schedule:
    - cron: '15 */2 * * *'  # Every 2 hours at :15
  workflow_dispatch:

jobs:
  scans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Alchemy recon from active wallet+chain pairs
        run: node src/build-alchemy-recon.js || node src/build-alchemy-recon.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_MNT_RPC_URL: ${{ secrets.ALCHEMY_MNT_RPC_URL }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
          ALCHEMY_MONAD_RPC_URL: ${{ secrets.ALCHEMY_MONAD_RPC_URL }}
          ALCHEMY_SONIC_RPC_URL: ${{ secrets.ALCHEMY_SONIC_RPC_URL }}
          ALCHEMY_INK_RPC_URL: ${{ secrets.ALCHEMY_INK_RPC_URL }}
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}
      - name: Build canonical token matches
        run: node src/build-canonical-token-matches.js
      - name: Fetch Morpho vault registry (skip-list for token discovery)
        run: node src/fetch-morpho-vaults.js || echo "morpho vault fetch failed, continuing"
      - name: Scan Aave positions
        run: node src/aave-scanner.js || node src/aave-scanner.js
      - name: Scan Morpho positions
        run: node src/morpho-scanner.js || node src/morpho-scanner.js
      - name: Token discovery (Layer 2 — vault / YBS / wallet-held)
        # Runs AFTER Morpho scanner so it can use the DB-derived Morpho
        # vault set to skip tokens the Morpho scanner already captured.
        run: node src/token-discovery.js || node src/token-discovery.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_MNT_RPC_URL: ${{ secrets.ALCHEMY_MNT_RPC_URL }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
          ALCHEMY_MONAD_RPC_URL: ${{ secrets.ALCHEMY_MONAD_RPC_URL }}
          ALCHEMY_SONIC_RPC_URL: ${{ secrets.ALCHEMY_SONIC_RPC_URL }}
          ALCHEMY_INK_RPC_URL: ${{ secrets.ALCHEMY_INK_RPC_URL }}
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}
      - name: Scan Euler positions (sub-account aware)
        run: node src/euler-scanner.js || node src/euler-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Scan Spark positions
        run: node src/spark-scanner.js || node src/spark-scanner.js
        env:
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
      - name: Scan Fluid positions (lending + vault NFTs)
        run: node src/fluid-scanner.js || node src/fluid-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
      - name: Scan Pendle positions
        run: node src/pendle-scanner.js || node src/pendle-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Scan Curve LP and gauge positions
        # Reads alchemy-token-discovery.json + curve_pools table. No RPC calls.
        # Curve pool catalogue is refreshed by the vaults workflow every 2h.
        run: node src/curve-scanner.js
      - name: Scan Compound V3 (Comet) positions
        # Iterates hardcoded Comet markets; batches balanceOf + borrowBalanceOf
        # per market. Native APY from getSupplyRate/getBorrowRate.
        run: node src/compound-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          DRPC_API_KEY: ${{ secrets.DRPC_API_KEY }}
      - name: Exposure adapter smoke tests
        # Pure-JS: validates registry + row shapes. Fast, no external calls.
        run: node test/exposure/smoke.test.js
      - name: Build position lookthrough (secondary risk)
        # Computes pro-rata exposure to collateral for vault-based positions.
        # Covers Aave V3, Spark Lend, and Morpho vaults via live REST/RPC APIs.
        run: node src/build-lookthrough.js || echo 'Lookthrough build failed — non-blocking'
      - name: Scan Ethena cooldowns (Locked USDe)
        run: node src/ethena-scanner.js || node src/ethena-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Scan YO Protocol (vault totalAssets)
        run: node src/yo-scanner.js || node src/yo-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Purge stale scanner-protocol positions (>6h, >$1K)
        run: node scripts/purge-stale-positions.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Enrich positions with market/vault info
        run: node src/enrich-markets.js
      - name: Fetch base APY rates
        run: node src/fetch-base-apy.js
      - name: Fetch Merkl incentives
        run: node src/fetch-merkl.js || node src/fetch-merkl.js || echo 'Merkl failed after 3 attempts'
      - name: Fix Morpho collateral labels
        run: node src/fix-morpho-tokens.js yield-tracker.db --apply
      - name: Export to data.json
        run: node src/export.js
      - name: Build source audit
        run: node src/source-audit.js
      - name: Build exposure coverage audit
        # Writes data/exposure-audit.json used by audit.html and the CI gate.
        # Non-strict here so we don't fail the pipeline during rollout; once
        # coverage is stable we'll switch to --strict to gate merges.
        run: node src/audit-exposure.js
      - name: Check regression fixtures (non-blocking)
        run: node src/check-fixtures.js || echo "⚠️ fixtures failed — review but continuing"
      - name: Validate data
        run: node src/validate.js
      - name: Pull latest from remote (avoids push race with Vaults workflow)
        # Both the scan and vaults workflows can commit at the same time.
        # Our scan pipeline has already regenerated the tracked output files
        # (data.json, recon files, DB) on disk. We need to get any upstream
        # commits from main without losing those regenerated files.
        #
        # Approach: stash THEM (the tracked regen outputs), fast-forward-only
        # pull (which won't conflict because they're stashed), then restore
        # our versions by force (since they're freshly generated from the
        # scan run, they're authoritative for this commit).
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          OUT_FILES="data.json data/recon/alchemy-token-discovery.json data/recon/canonical-token-matches.json data/source-audit.json data/exposure-audit.json data/total-history.json yield-tracker.db"
          # Save our regenerated outputs outside the repo so rebase can't touch them
          mkdir -p /tmp/scan-output
          for f in $OUT_FILES; do
            if [ -f "$f" ]; then
              mkdir -p "/tmp/scan-output/$(dirname $f)"
              cp "$f" "/tmp/scan-output/$f"
            fi
          done
          # Discard working-tree changes to those files and any untracked cruft
          git checkout -- $OUT_FILES 2>/dev/null || true
          # Fetch + fast-forward main
          git fetch origin main
          git reset --hard origin/main
          # Restore our regenerated outputs over the top
          for f in $OUT_FILES; do
            if [ -f "/tmp/scan-output/$f" ]; then
              mkdir -p "$(dirname $f)"
              cp "/tmp/scan-output/$f" "$f"
            fi
          done
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly free scans ${{ github.run_number }}"
          file_pattern: data/recon/alchemy-token-discovery.json data/recon/canonical-token-matches.json data/source-audit.json data/exposure-audit.json data.json data/total-history.json yield-tracker.db
