name: Hourly Free Scans

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  scans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Alchemy recon from active wallet+chain pairs
        run: node src/build-alchemy-recon.js || node src/build-alchemy-recon.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_MNT_RPC_URL: ${{ secrets.ALCHEMY_MNT_RPC_URL }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
          ALCHEMY_MONAD_RPC_URL: ${{ secrets.ALCHEMY_MONAD_RPC_URL }}
          ALCHEMY_SONIC_RPC_URL: ${{ secrets.ALCHEMY_SONIC_RPC_URL }}
          ALCHEMY_INK_RPC_URL: ${{ secrets.ALCHEMY_INK_RPC_URL }}
      - name: Build canonical token matches
        run: node src/build-canonical-token-matches.js
      - name: Fetch Morpho vault registry (skip-list for token discovery)
        run: node src/fetch-morpho-vaults.js || echo "morpho vault fetch failed, continuing"
      - name: Scan Aave positions
        run: node src/aave-scanner.js || node src/aave-scanner.js
      - name: Scan Morpho positions
        run: node src/morpho-scanner.js || node src/morpho-scanner.js
      - name: Token discovery (Layer 2 — vault / YBS / wallet-held)
        # Runs AFTER Morpho scanner so it can use the DB-derived Morpho
        # vault set to skip tokens the Morpho scanner already captured.
        run: node src/token-discovery.js || node src/token-discovery.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_MNT_RPC_URL: ${{ secrets.ALCHEMY_MNT_RPC_URL }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
          ALCHEMY_MONAD_RPC_URL: ${{ secrets.ALCHEMY_MONAD_RPC_URL }}
          ALCHEMY_SONIC_RPC_URL: ${{ secrets.ALCHEMY_SONIC_RPC_URL }}
          ALCHEMY_INK_RPC_URL: ${{ secrets.ALCHEMY_INK_RPC_URL }}
      - name: Scan Euler positions (sub-account aware)
        run: node src/euler-scanner.js || node src/euler-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Scan Spark positions
        run: node src/spark-scanner.js || node src/spark-scanner.js
        env:
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARB_RPC_URL: ${{ secrets.ARB_RPC_URL }}
      - name: Scan Fluid positions (lending + vault NFTs)
        run: node src/fluid-scanner.js || node src/fluid-scanner.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_PLASMA_RPC_URL: ${{ secrets.ALCHEMY_PLASMA_RPC_URL }}
      - name: Scan Pendle positions
        run: node src/pendle-scanner.js || node src/pendle-scanner.js
      - name: Scan Ethena cooldowns (Locked USDe)
        run: node src/ethena-scanner.js || node src/ethena-scanner.js
      - name: Scan YO Protocol (vault totalAssets)
        run: node src/yo-scanner.js || node src/yo-scanner.js
      - name: Purge stale scanner-protocol positions (>6h, >$1K)
        run: node scripts/purge-stale-positions.js
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      - name: Enrich positions with market/vault info
        run: node src/enrich-markets.js
      - name: Fetch base APY rates
        run: node src/fetch-base-apy.js
      - name: Fetch Merkl incentives
        run: node src/fetch-merkl.js || node src/fetch-merkl.js || echo 'Merkl failed after 3 attempts'
      - name: Fix Morpho collateral labels
        run: node src/fix-morpho-tokens.js yield-tracker.db --apply
      - name: Export to data.json
        run: node src/export.js
      - name: Build source audit
        run: node src/source-audit.js
      - name: Check regression fixtures (non-blocking)
        run: node src/check-fixtures.js || echo "⚠️ fixtures failed — review but continuing"
      - name: Validate data
        run: node src/validate.js
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly free scans ${{ github.run_number }}"
          file_pattern: data/recon/alchemy-token-discovery.json data/recon/canonical-token-matches.json data/source-audit.json data.json data/total-history.json yield-tracker.db
