<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Yield Tracker — Dashboard</title>
<link rel="icon" href="favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #ffffff;
  --text-secondary: #c9d1d9;
  --accent-blue: #58a6ff;
  --accent-green: #4ade80;
  --accent-purple: #a371f7;
  --accent-orange: #d29922;
  --gradient-1: linear-gradient(135deg, #0D47A1 0%, #00E5FF 100%);
  --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0a0e1a 0%, #0d1a2e 25%, #102240 50%, #142a4a 75%, #183354 100%);
  background-attachment: fixed;
  color: var(--text-primary);
  line-height: 1.6;
}

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: -0.5px;
  background: var(--gradient-3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.last-updated {
  color: var(--text-secondary);
  font-size: 14px;
}

/* Summary Cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.summary-card {
  background: linear-gradient(175deg, #2a5a9a 0%, #1e4a8a 5%, #244888a0 50%, #0e2a4a 100%);
  border: 1px solid var(--border);
  box-shadow: inset 0 1px 0 rgba(200,220,255,0.25), inset 0 2px 2px rgba(100,160,230,0.1), inset 0 -2px 6px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.5), 0 1px 6px rgba(80,140,220,0.2);
  border-radius: 12px;
  padding: 20px;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.summary-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent-blue);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.summary-card .label {
  color: var(--text-secondary);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.summary-card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
}

.summary-card .value.total { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.summary-card .value.apy { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.summary-card .value.positions { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.summary-card .value.whales { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Charts Section */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

.chart-card {
  background: linear-gradient(175deg, #1a3a6a 0%, #224e82 20%, #2a5a9a 45%, #3468a4 55%, #2a5a9a 70%, #224e82 85%, #1a3a6a 100%);
  border: 1px solid var(--border);
  box-shadow: inset 0 2px 3px rgba(100,180,255,0.2), inset 0 -3px 8px rgba(0,20,60,0.5), 0 6px 20px rgba(0,0,0,0.5), 0 1px 6px rgba(80,140,220,0.2);
  transition: transform 0.2s, border-color 0.2s;
  border-radius: 12px;
  padding: 20px;
  min-height: 350px;
  display: flex;
  flex-direction: column;
}

.chart-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent-blue);
}

.chart-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.chart-card canvas {
  width: 100%;
  height: 250px;
}

/* Yield Bearing Stables Table */
.stables-table {
  flex: 1;
  overflow-y: auto;
  max-height: 280px;
}

.stables-table::-webkit-scrollbar {
  width: 6px;
}
.stables-table::-webkit-scrollbar-track {
  background: #0d1117;
}
.stables-table::-webkit-scrollbar-thumb {
  background: #30363d;
  border-radius: 3px;
}
.stables-table::-webkit-scrollbar-thumb:hover {
  background: #484f58;
}
.stables-table {
  scrollbar-width: thin;
  scrollbar-color: #30363d #0d1117;
}

.stables-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.stables-table th {
  background: var(--bg-secondary);
  padding: 10px 12px;
  text-align: left;
  color: var(--text-secondary);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;

.stables-table th:last-child {
  text-align: right;
}
}

.stables-table td {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  color: var(--text-primary);
}

.stables-table td:last-child {
  text-align: right;
  font-weight: 600;
  color: var(--accent-green);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.stables-table tr:hover td {
  background: var(--bg-secondary);
}

.stables-placeholder {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px 20px;
  font-size: 14px;
}

/* Whales Grid */
.whales-section {
  margin-top: 32px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-header h2 {
  font-size: 20px;
  font-weight: 600;
}

.whales-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}

.whale-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
}

.whale-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent-blue);
}

.whale-card-header {
  padding: 20px;
  background: var(--gradient-1);
  position: relative;
}

.whale-card-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--bg-card));
}

.whale-card-header h3 {
  font-size: 18px;
  font-weight: 600;
  color: white;
  margin-bottom: 4px;
}

.whale-card-header .chain-count {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
}

.whale-card-body {
  padding: 20px;
}

.whale-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.whale-stat:last-child { border-bottom: none; }

.whale-stat .label {
  color: var(--text-secondary);
  font-size: 14px;
}

.whale-stat .value {
  font-weight: 600;
  font-size: 15px;
}

.whale-stat .value.money {
  color: var(--accent-green);
}

.whale-card-footer {
  padding: 16px 20px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
}

.view-details-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
  border: 1px solid #2d4a6f;
  color: white;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s;
}

.view-details-btn:hover {
  background: linear-gradient(135deg, #2a4a6f 0%, #1a3a5f 100%);
  border-color: #3d6a9f;
}

/* Responsive */
@media (max-width: 1024px) {
  .charts-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .container { padding: 16px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .whales-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 22px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="favicon.jpg" alt="Logo" style="width:36px;height:36px;border-radius:8px;margin-right:12px">
    <h1>Protocol Yield Tracker</h1>
    <div class="last-updated" id="lastUpdated">Last updated: --</div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">Total Value</div>
      <div class="value total" id="totalValue">$0</div>
    </div>
    <div class="summary-card">
      <div class="label">Avg APY</div>
      <div class="value apy" id="avgApy">--%</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Positions</div>
      <div class="value positions" id="totalPositions">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Active Whales</div>
      <div class="value whales" id="activeWhales">0</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Vaults</h3>
      <div class="stables-table">
        <table id="vaultsTable">
          <thead>
            <tr>
              <th style="cursor:pointer" onclick="sortVaults('protocol')">Protocol</th>
              <th style="cursor:pointer" onclick="sortVaults('name')">Name</th>
              <th style="text-align:right;cursor:pointer" onclick="sortVaults('tvl_usd')">TVL</th>
              <th style="text-align:right;cursor:pointer" onclick="sortVaults('apy_1d')">1d</th>
              <th style="text-align:right;cursor:pointer" onclick="sortVaults('apy_7d')">7d</th>
              <th style="text-align:right;cursor:pointer" onclick="sortVaults('apy_30d')">30d</th>
            </tr>
          </thead>
          <tbody id="vaultsList">
            <tr><td colspan="6" class="stables-placeholder">Loading vault data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="chart-card">
      <h3>Yield Bearing Stables</h3>
      <div class="stables-table">
        <table id="stablesTable">
          <thead>
            <tr>
              <th style="cursor:pointer" onclick="sortStables('protocol')">Protocol</th>
              <th style="cursor:pointer" onclick="sortStables('name')">Token</th>
              <th style="text-align:right;cursor:pointer" onclick="sortStables('tvlNum')">TVL</th>
              <th style="text-align:right;cursor:pointer" onclick="sortStables('apy_1d')">1d</th>
              <th style="text-align:right;cursor:pointer" onclick="sortStables('apy_7d')">7d</th>
              <th style="text-align:right;cursor:pointer" onclick="sortStables('apy_30d')">30d</th>
            </tr>
          </thead>
          <tbody id="stablesList">
            <tr><td colspan="6" class="stables-placeholder">Data coming soon...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Whales Grid -->
  <div class="whales-section">
    <div class="section-header">
      <h2>Whales</h2>
    </div>
    <div class="whales-grid" id="whalesGrid"></div>
  </div>
</div>

<script>
let DATA = {whales: {}, summary: {}};

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    DATA = await res.json();
    console.log('Data loaded:', Object.keys(DATA.whales).length, 'whales');
    render();
    renderStables();
  } catch (e) {
    console.error('Load failed:', e);
    document.querySelector('.container').innerHTML = '<div style="text-align:center;padding:80px;color:#f85149"><h2>Failed to load data.json</h2><p style="color:#c9d1d9;margin-top:8px">' + e.message + '</p></div>';
  }
}

function renderStables() {
  const tbody = document.getElementById('stablesList');
  if (!tbody) return;
  
  fetch('data/stables.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const stables = data.stables || [];
      if (stables.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="stables-placeholder">No data available</td></tr>';
        return;
      }
      window._stablesData = stables;
      window._stablesSort = { field: 'tvlNum', dir: -1 };
      sortStables('tvlNum');
    })
    .catch(() => {
      tbody.innerHTML = '<tr><td colspan="3" class="stables-placeholder">Failed to load stables data</td></tr>';
    });
}

function sortStables(field) {
  const data = window._stablesData || [];
  const sort = window._stablesSort;
  if (sort.field === field) sort.dir *= -1;
  else { sort.field = field; sort.dir = -1; }
  const isStr = field === 'name' || field === 'protocol';
  data.sort((a, b) => {
    const av = a[field] != null ? a[field] : (isStr ? '' : -Infinity);
    const bv = b[field] != null ? b[field] : (isStr ? '' : -Infinity);
    return isStr ? sort.dir * String(av).localeCompare(String(bv)) : sort.dir * (bv - av);
  });
  const tbody = document.getElementById('stablesList');
  let h = '';
  for (const s of data) {
    const apy1 = s.apy_1d != null && s.apy_1d !== 0 ? '<span style="color:' + (s.apy_1d > 0 ? '#4ade80' : s.apy_1d < 0 ? '#f85149' : '#c9d1d9') + '">' + s.apy_1d.toFixed(2) + '%</span>' : '<span style="color:#555">-</span>';
    const apy7 = s.apy_7d != null && s.apy_7d !== 0 ? '<span style="color:' + (s.apy_7d > 0 ? '#4ade80' : s.apy_7d < 0 ? '#f85149' : '#c9d1d9') + '">' + s.apy_7d.toFixed(2) + '%</span>' : '<span style="color:#555">-</span>';
    const apy30 = s.apy_30d != null && s.apy_30d !== 0 ? '<span style="color:' + (s.apy_30d > 0 ? '#4ade80' : s.apy_30d < 0 ? '#f85149' : '#c9d1d9') + '">' + s.apy_30d.toFixed(2) + '%</span>' : '<span style="color:#555">-</span>';
    h += '<tr>' +
      '<td style="color:var(--text-primary)"><strong>' + (s.protocol || '-') + '</strong></td>' +
      '<td style="color:var(--text-primary)">' + s.name + '</td>' +
      '<td style="text-align:right;color:#e8e8e8">' + s.tvl + '</td>' +
      '<td style="text-align:right">' + apy1 + '</td>' +
      '<td style="text-align:right">' + apy7 + '</td>' +
      '<td style="text-align:right">' + apy30 + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = h;
}

// Vaults
let _vaultsData = [];
let _vaultsSort = { field: 'tvl_usd', dir: -1 };

async function loadVaults() {
  try {
    const res = await fetch('data/vaults.json?t=' + Date.now());
    const data = await res.json();
    _vaultsData = data.vaults || [];
    sortVaults('tvl_usd');
  } catch (e) {
    document.getElementById('vaultsList').innerHTML = '<tr><td colspan="6" class="stables-placeholder">Failed to load vault data</td></tr>';
  }
}

function fmtApy(v) {
  if (v == null || v === 0) return '<span style="color:#555">-</span>';
  const color = v > 0 ? '#4ade80' : v < 0 ? '#f85149' : '#c9d1d9';
  return '<span style="color:' + color + '">' + v.toFixed(2) + '%</span>';
}

function fmtTvl(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
}

function sortVaults(field) {
  const sort = _vaultsSort;
  if (sort.field === field) sort.dir *= -1;
  else { sort.field = field; sort.dir = -1; }
  const isStr = field === 'name' || field === 'protocol';
  _vaultsData.sort((a, b) => {
    const av = a[field] != null ? a[field] : (isStr ? '' : -Infinity);
    const bv = b[field] != null ? b[field] : (isStr ? '' : -Infinity);
    return isStr ? sort.dir * String(av).localeCompare(String(bv)) : sort.dir * (bv - av);
  });
  const tbody = document.getElementById('vaultsList');
  let h = '';
  for (const v of _vaultsData) {
    h += '<tr>' +
      '<td style="color:var(--text-primary)"><strong>' + v.protocol + '</strong></td>' +
      '<td style="color:var(--text-primary)">' + v.name + '</td>' +
      '<td style="text-align:right;color:#e8e8e8">' + fmtTvl(v.tvl_usd) + '</td>' +
      '<td style="text-align:right">' + fmtApy(v.apy_1d) + '</td>' +
      '<td style="text-align:right">' + fmtApy(v.apy_7d) + '</td>' +
      '<td style="text-align:right">' + fmtApy(v.apy_30d) + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = h;
}

function fmt(n) {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(2);
}

function fmtNum(n) {
  return n.toLocaleString();
}

function getGradient(ctx, colors) {
  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  colors.forEach((c, i) => gradient.addColorStop(i / (colors.length - 1), c));
  return gradient;
}

async function render() {
  const whales = DATA.whales;
  const whaleNames = Object.keys(whales);
  
  // Calculate totals
  let totalValue = 0;
  let totalPositions = 0;
  let totalApyWeighted = 0;
  const protocolValues = {};
  const chainValues = {};
  
  whaleNames.forEach(name => {
    const whale = whales[name];
    const positions = whale.positions || [];
    totalPositions += positions.length;
    
    positions.forEach(p => {
      const value = p.net_usd || 0;
      totalValue += value;
      totalApyWeighted += value * (p.apy_net || 0);
      
      // Protocol breakdown
      const proto = p.protocol_name || 'Unknown';
      protocolValues[proto] = (protocolValues[proto] || 0) + value;
      
      // Chain breakdown
      const chain = p.chain || 'Unknown';
      chainValues[chain] = (chainValues[chain] || 0) + value;
    });
  });
  
  const avgApy = totalValue > 0 ? (totalApyWeighted / totalValue).toFixed(2) : 0;
  const activeWhales = whaleNames.filter(n => (whales[n].positions || []).length > 0).length;
  
  // Update summary cards
  document.getElementById('totalValue').textContent = fmt(totalValue);
  document.getElementById('avgApy').textContent = avgApy + '%';
  document.getElementById('totalPositions').textContent = fmtNum(totalPositions);
  document.getElementById('activeWhales').textContent = activeWhales;
  
  // Last updated + daily/weekly change.
  // data.json writes generated_at at the TOP level, not under summary.
  // Kept the summary fallback for backward compat, and the Date.now
  // fallback only as a last resort if data.json is missing the field.
  const genAt = DATA.generated_at || DATA.summary?.generated_at || null;
  let changeText = genAt
    ? 'Last updated: ' + new Date(genAt).toLocaleString()
    : 'Last updated: (unknown)';
  try {
    const history = JSON.parse(await (await fetch('data/total-history.json?t=' + Date.now())).text());
    if (history.length >= 2) {
      const prev = history[history.length - 2];
      const dailyChange = ((totalValue - prev.total) / prev.total * 100);
      const dailySign = dailyChange >= 0 ? '+' : '';
      const dailyColor = dailyChange >= 0 ? '#4ade80' : '#f85149';
      changeText += ` · <span style="color:${dailyColor}">${dailySign}${dailyChange.toFixed(2)}% day</span>`;
    }
    if (history.length >= 7) {
      const weekAgo = history[history.length - 7];
      const weeklyChange = ((totalValue - weekAgo.total) / weekAgo.total * 100);
      const weeklySign = weeklyChange >= 0 ? '+' : '';
      const weeklyColor = weeklyChange >= 0 ? '#4ade80' : '#f85149';
      changeText += ` · <span style="color:${weeklyColor}">${weeklySign}${weeklyChange.toFixed(2)}% week</span>`;
    }
  } catch(e) {}
  document.getElementById('lastUpdated').innerHTML = changeText;
  
  // Load vaults
  loadVaults();
  
  // Render whale cards
  const grid = document.getElementById('whalesGrid');
  whaleNames.sort((a, b) => {
    const aVal = (whales[a].positions || []).reduce((s, p) => s + (p.net_usd || 0), 0);
    const bVal = (whales[b].positions || []).reduce((s, p) => s + (p.net_usd || 0), 0);
    return bVal - aVal;
  });
  
  whaleNames.forEach(name => {
    const whale = whales[name];
    const positions = whale.positions || [];
    const total = positions.reduce((s, p) => s + (p.net_usd || 0), 0);
    const chains = [...new Set(positions.map(p => p.chain))];
    const avgApyWhale = total > 0 ? (positions.reduce((s, p) => s + (p.net_usd || 0) * (p.apy_net || 0), 0) / total).toFixed(2) : 0;
    
    const card = document.createElement('div');
    card.className = 'whale-card';
    card.innerHTML = `
      <div class="whale-card-header">
        <h3>${name}</h3>
        <div class="chain-count">${chains.length} chain${chains.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="whale-card-body">
        <div class="whale-stat">
          <span class="label">Total Value</span>
          <span class="value money">${fmt(total)}</span>
        </div>
        <div class="whale-stat">
          <span class="label">Positions</span>
          <span class="value">${fmtNum(positions.length)}</span>
        </div>
        <div class="whale-stat">
          <span class="label">Avg APY</span>
          <span class="value">${avgApyWhale}%</span>
        </div>
        <div class="whale-stat">
          <span class="label">Wallets</span>
          <span class="value">${fmtNum(whale.total_wallets || whale.wallets?.length || 1)}</span>
        </div>
      </div>
      <div class="whale-card-footer">
        <a href="${name.toLowerCase().replace(/\s+/g, '-')}.html" class="view-details-btn">View Details →</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

loadData();
</script>
</body>
</html>
